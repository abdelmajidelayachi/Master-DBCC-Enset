spring.application.name=project_spring_angular
server.port=8086

# Base de donnees H2 en memoire (console: http://localhost:8085/h2-console)
spring.datasource.url=jdbc:h2:mem:bank-db;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT (HS512) - secret de demonstration pour le projet
jwt.secret=9faa372517ac1d389758d3750fc07acf00f542277f26fec1ce4593e93f64e338a37ca9a55c93f584b7d4e0e8d60c243356b3e5f92ac9d15cd3a35d51ffa7d5e2
jwt.expiration-minutes=120

# Chatbot RAG - Google Gemini via son endpoint compatible OpenAI.
# La cle est lue depuis GEMINI_API_KEY ou depuis secrets.properties (non versionne) :
# elle ne doit JAMAIS etre ecrite dans un fichier commite.
spring.config.import=optional:file:./secrets.properties
ai.api.key=${GEMINI_API_KEY:}
ai.api.base-url=https://generativelanguage.googleapis.com/v1beta/openai
ai.chat.model=gemini-flash-latest
ai.embedding.model=gemini-embedding-001

# Bot Telegram (optionnel) - token dans secrets.properties, laisser vide pour desactiver
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}

# Swagger UI: http://localhost:8085/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

name: flutter_intro_app
description: >-
  Reproduction modernisée des applications du support "Introduction à Flutter"
  (Quiz, Weather, Gallery, Camera OCR, QR Scan, Chat json-server).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  intl: ^0.19.0
  image_picker: ^1.1.0
  mobile_scanner: ^5.1.1
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
